version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rcm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/rcm_db
      SECRET_KEY: change-me-in-production
      JWT_SECRET_KEY: change-me-jwt-in-production
      FRONTEND_URL: http://localhost:5173
      RESEND_API_KEY: ""
      RESEND_FROM_EMAIL: noreply@rcm.edu
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
